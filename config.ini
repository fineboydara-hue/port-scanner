[mail]
# Your SMTP email address used to send alerts
address = your-email@gmail.com
# Recommended: generate a 16-character App Password (Mail + Linux) and paste it here
# Example: abcdefghijklmnop
password = your_16_char_app_password_here
# Comma-separated list of recipients for alerts
recipients = fineboydara@gmail.com,jairusmicheal26@gmail.com

[auth]
# Admin credentials for the web dashboard
admin_user = admin
admin_pass = change_this_to_a_strong_password

[server]
# Host and port to bind the web UI
host = 0.0.0.0
port = 5000
# A random secret key for Flask sessions. Replace with a long random string before sharing.
secret_key = replace_with_random_string
